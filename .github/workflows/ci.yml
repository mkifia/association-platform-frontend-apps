name: Frontend Apps CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            */node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
            
      # Install dependencies for all apps
      - name: Install Member Portal dependencies
        run: |
          cd member-portal
          npm ci
          
      - name: Install Operator Dashboard dependencies  
        run: |
          cd operator-dashboard
          npm ci
          
      - name: Install Association Dashboard dependencies
        run: |
          cd association-dashboard
          npm ci
          
      # Linting & Formatting
      - name: Run ESLint on Member Portal
        run: |
          cd member-portal
          npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0
          
      - name: Run ESLint on Operator Dashboard
        run: |
          cd operator-dashboard
          npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0
          
      - name: Run ESLint on Association Dashboard
        run: |
          cd association-dashboard
          npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0
          
      - name: Check Prettier formatting
        run: |
          npx prettier --check "*/src/**/*.{ts,tsx,js,jsx,json,css,scss}"

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          cd member-portal && npm ci
          cd ../operator-dashboard && npm ci
          cd ../association-dashboard && npm ci
          
      # TypeScript compilation
      - name: TypeScript check Member Portal
        run: |
          cd member-portal
          npx tsc --noEmit
          
      - name: TypeScript check Operator Dashboard
        run: |
          cd operator-dashboard
          npx tsc --noEmit
          
      - name: TypeScript check Association Dashboard
        run: |
          cd association-dashboard
          npx tsc --noEmit

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        app: [member-portal, operator-dashboard, association-dashboard]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            ${{ matrix.app }}/node_modules
            ${{ matrix.app }}/.next
          key: ${{ runner.os }}-${{ matrix.app }}-${{ matrix.node-version }}-${{ hashFiles(format('{0}/package-lock.json', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.app }}-${{ matrix.node-version }}-
            
      - name: Install ${{ matrix.app }} dependencies
        run: |
          cd ${{ matrix.app }}
          npm ci
          
      - name: Build ${{ matrix.app }}
        run: |
          cd ${{ matrix.app }}
          npm run build
          
      - name: Run ${{ matrix.app }} tests
        run: |
          cd ${{ matrix.app }}
          npm test || true  # Tests might not exist yet
          
      # Basic functionality tests
      - name: Start ${{ matrix.app }} and test
        run: |
          cd ${{ matrix.app }}
          timeout 30 npm start &
          sleep 10
          curl -f http://localhost:3000 || exit 1
          
  lighthouse:
    name: Performance & Accessibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install Member Portal dependencies
        run: |
          cd member-portal
          npm ci
          
      - name: Build Member Portal
        run: |
          cd member-portal
          npm run build
          
      - name: Start Member Portal
        run: |
          cd member-portal
          npm start &
          sleep 10
          
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000
          configPath: './member-portal/lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          
      - name: Security audit Member Portal
        run: |
          cd member-portal
          npm audit --audit-level=moderate
          
      - name: Security audit Operator Dashboard  
        run: |
          cd operator-dashboard
          npm audit --audit-level=moderate
          
      - name: Security audit Association Dashboard
        run: |
          cd association-dashboard
          npm audit --audit-level=moderate

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, type-check, build]
    
    strategy:
      matrix:
        app: [member-portal, operator-dashboard, association-dashboard]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.app }}
          push: false
          tags: association-platform/${{ matrix.app }}:test
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            NODE_ENV=production
            
      - name: Test ${{ matrix.app }} container startup
        run: |
          docker run -d --name ${{ matrix.app }}-test -p 3000:3000 association-platform/${{ matrix.app }}:test
          sleep 15
          curl -f http://localhost:3000 || (docker logs ${{ matrix.app }}-test && exit 1)
          docker stop ${{ matrix.app }}-test
